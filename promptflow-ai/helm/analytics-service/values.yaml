# helm/analytics-service/values.yaml
replicaCount: 2

image:
  repository: ""          # Set by CI/CD: ECR_REGISTRY/promptflow/analytics-service
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "analytics-service"

service:
  type: ClusterIP
  port: 3001
  targetPort: 3001

ingress:
  enabled: true
  className: nginx
  host: ""                # Set by setup.sh
  path: /api/auth
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health/live
    port: 3001
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 3001
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

env:
  NODE_ENV: production
  PORT: "3001"
  LOG_LEVEL: info
  DB_HOST: ""
  DB_PORT: "5432"
  DB_NAME: promptflow
  DB_USER: promptflow
  REDIS_HOST: ""
  REDIS_PORT: "6379"
  JWT_EXPIRES_IN: 15m
  REFRESH_TOKEN_EXPIRES: 7d
  CORS_ORIGIN: "*"

# These reference Kubernetes Secrets
secretEnv:
  DB_PASSWORD:
    secretName: db-credentials
    key: DB_PASSWORD
  JWT_SECRET:
    secretName: jwt-secret
    key: JWT_SECRET
  REDIS_PASSWORD:
    secretName: redis-credentials
    key: REDIS_PASSWORD

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3001"
  prometheus.io/path: "/health/metrics"

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [analytics-service]
          topologyKey: kubernetes.io/hostname

{{/* helm/postgresql/templates/statefulset.yaml */}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: promptflow
spec:
  serviceName: postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgresql
        app.kubernetes.io/name: postgresql
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
        runAsNonRoot: true
      terminationGracePeriodSeconds: 60
      initContainers:
        # Init: create application schemas/databases
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h localhost -U "${POSTGRES_USER}"; do
                echo "Waiting for PostgreSQL to start..."
                sleep 2
              done
              psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c "
                CREATE SCHEMA IF NOT EXISTS workspace;
                CREATE SCHEMA IF NOT EXISTS ai;
                CREATE SCHEMA IF NOT EXISTS billing;
                CREATE SCHEMA IF NOT EXISTS analytics;
                CREATE SCHEMA IF NOT EXISTS notifications;
                GRANT ALL ON SCHEMA workspace TO ${POSTGRES_USER};
                GRANT ALL ON SCHEMA ai TO ${POSTGRES_USER};
                GRANT ALL ON SCHEMA billing TO ${POSTGRES_USER};
                GRANT ALL ON SCHEMA analytics TO ${POSTGRES_USER};
                GRANT ALL ON SCHEMA notifications TO ${POSTGRES_USER};
              " || true
          env:
            - name: POSTGRES_USER
              value: {{ .Values.auth.username }}
            - name: POSTGRES_DB
              value: {{ .Values.auth.database }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKey }}
      containers:
        - name: postgresql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.auth.username }}
            - name: POSTGRES_DB
              value: {{ .Values.auth.database }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKey }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.auth.username | quote }}, "-d", {{ .Values.auth.database | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.auth.username | quote }}, "-d", {{ .Values.auth.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.primary.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
      volumes:
        - name: config
          configMap:
            name: postgresql-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: postgresql
        annotations:
          volume.beta.kubernetes.io/storage-class: {{ .Values.primary.persistence.storageClass }}
      spec:
        accessModes:
          {{- toYaml .Values.primary.persistence.accessModes | nindent 10 }}
        storageClassName: {{ .Values.primary.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.primary.persistence.size }}

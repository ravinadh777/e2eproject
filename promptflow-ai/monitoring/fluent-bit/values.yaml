# monitoring/fluent-bit/values.yaml
image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: "2.2"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""  # Set to IAM role ARN if using IRSA

tolerations:
  - operator: Exists

config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.promptflow.*
        Path              /var/log/containers/*_promptflow_*.log
        multiline.parser  docker, cri
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        DB                /var/log/flb_kube.db

    [INPUT]
        Name              tail
        Tag               kube.monitoring.*
        Path              /var/log/containers/*_monitoring_*.log
        multiline.parser  docker, cri
        Mem_Buf_Limit     20MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Annotations         Off
        Labels              On

    [FILTER]
        Name   record_modifier
        Match  kube.promptflow.*
        Record cluster promptflow-cluster
        Record environment dev
        Record project promptflow-ai

    [FILTER]
        Name   grep
        Match  kube.promptflow.*
        Exclude log ^\s*$

  outputs: |
    # Send to Loki for real-time viewing in Grafana
    [OUTPUT]
        Name            loki
        Match           kube.promptflow.*
        Host            loki.logging.svc.cluster.local
        Port            3100
        Labels          job=promptflow, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name']
        Line_Format     json
        Auto_Kubernetes_Labels  On

    # Send to S3 for long-term storage
    [OUTPUT]
        Name                         s3
        Match                        kube.promptflow.*
        bucket                       promptflow-logs-ACCOUNT_ID_PLACEHOLDER
        region                       us-east-1
        total_file_size              100M
        s3_key_format                /application-logs/%Y/%m/%d/$TAG[4].%H%M%S.log.gz
        s3_key_format_tag_delimiters .
        use_put_object               Off
        compression                  gzip
        upload_timeout               10m
        store_dir                    /tmp/fluent-bit-s3
        log_key                      log

    # Also send security/audit logs to S3 separately
    [OUTPUT]
        Name            s3
        Match           kube.monitoring.*
        bucket          promptflow-logs-ACCOUNT_ID_PLACEHOLDER
        region          us-east-1
        total_file_size 50M
        s3_key_format   /monitoring-logs/%Y/%m/%d/$TAG[3].%H%M%S.log.gz
        compression     gzip
        upload_timeout  10m

daemonset:
  enabled: true

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

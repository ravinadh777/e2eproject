# monitoring/prometheus/values.yaml
# Values for kube-prometheus-stack Helm chart

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    additionalScrapeConfigs:
      - job_name: 'promptflow-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [promptflow]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
      smtp_require_tls: true
    route:
      group_by: [alertname, namespace, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: gmail-alerts
      routes:
        - match:
            severity: critical
          receiver: gmail-alerts
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: gmail-alerts
          repeat_interval: 4h
    receivers:
      - name: gmail-alerts
        email_configs:
          - to: ALERT_EMAIL_PLACEHOLDER
            send_resolved: true
            headers:
              Subject: '[{{ .Status | toUpper }}] PromptFlow Alert: {{ .GroupLabels.alertname }}'
            html: |
              {{ range .Alerts }}
              <b>Alert:</b> {{ .Annotations.summary }}<br>
              <b>Description:</b> {{ .Annotations.description }}<br>
              <b>Severity:</b> {{ .Labels.severity }}<br>
              <b>Namespace:</b> {{ .Labels.namespace }}<br>
              <b>Service:</b> {{ .Labels.service }}<br>
              <b>Started:</b> {{ .StartsAt }}<br>
              {{ end }}
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname, namespace]

grafana:
  enabled: true
  adminUser: admin
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: gp2
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: PromptFlow
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus:9090
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki.logging.svc.cluster.local:3100
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
